<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff69b4;
            --secondary: #ff1493;
            --primary-light: #ffb6c1;
            --bg-dark: #0f0a0c;
            --glass: rgba(255, 20, 147, 0.08);
            --glass-border: rgba(255, 20, 147, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Background Overlay */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0f0a0c 0%, #2a0a1a 100%);
            z-index: -2;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            filter: blur(5px);
            z-index: -1;
            transition: opacity 2s ease, filter 2s ease;
        }

        /* Floating Particles */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Welcome Screen */
        .welcome-screen {
            position: absolute;
            z-index: 10;
            text-align: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gift-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 2rem;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .gift-box {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(255, 20, 147, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .gift-ribbon {
            position: absolute;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .ribbon-v { width: 30px; height: 100%; left: 50%; transform: translateX(-50%); }
        .ribbon-h { height: 30px; width: 100%; top: 50%; transform: translateY(-50%); }

        .gift-lid {
            position: absolute;
            top: -10px;
            left: -5%;
            width: 110%;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 2;
            transition: transform 0.5s ease;
        }

        .gift-bow {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 40px;
            z-index: 3;
        }

        .gift-bow::before, .gift-bow::after {
            content: '';
            position: absolute;
            width: 35px;
            height: 35px;
            border: 8px solid #fff;
            border-radius: 50% 50% 0 50%;
            transform: rotate(45deg);
        }

        .gift-bow::after {
            left: 25px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
        }

        .gift-container:hover .gift-lid {
            transform: translateY(-10px) rotate(-5deg);
        }

        .tap-text {
            margin-top: 1rem;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Main Content */
        .main-content {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.9);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 90%;
            max-width: 1000px;
            padding: 3rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            text-align: center;
            z-index: 5;
        }

        .main-content.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary), #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .message {
            font-size: clamp(1rem, 3.5vw, 1.25rem);
            font-weight: 400;
            line-height: 2;
            margin-bottom: 2.5rem;
            color: rgba(255,255,255,0.95);
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            font-style: italic;
        }

        .signature {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-top: 2rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .signature.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Featured Photo Frame */
        .featured-photo-container {
            display: flex;
            justify-content: center;
            margin: 2rem auto;
            perspective: 1000px;
        }

        .photo-frame {
            position: relative;
            width: 280px;
            height: 350px;
            border-radius: 20px;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 15px 35px rgba(255, 20, 147, 0.4),
                        0 0 20px rgba(255, 20, 147, 0.2);
            animation: frameFloat 4s ease-in-out infinite;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes frameFloat {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        .photo-frame:hover {
            transform: scale(1.05) rotate(0deg);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .photo-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        /* Shine effect on frame */
        .photo-frame::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255,255,255,0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: frameShine 3s infinite;
        }

        @keyframes frameShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .btn-celebrate {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.4);
            transition: transform 0.3s ease;
        }

        .btn-celebrate:hover {
            transform: translateY(-5px) scale(1.05);
        }

        /* Floating Balloons Background */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 50px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.5;
            z-index: 1;
            animation: float-up linear forwards;
        }

        @keyframes float-up {
            to {
                transform: translateY(-120vh) translateX(var(--drift));
            }
        }

        /* Music Toggle Button */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .music-control:hover {
            background: var(--primary);
            color: #000;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .main-content {
                padding: 1.5rem;
                width: 95%;
            }
            .photo-frame {
                width: 220px;
                height: 280px;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="bg-image" id="bgImage" style="background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('img2.png');"></div>
    <div id="particles-js"></div>

    <div class="welcome-screen" id="welcomeScreen">
        <div class="gift-container" onclick="reveal()">
            <div class="gift-box">
                <div class="gift-ribbon ribbon-v"></div>
                <div class="gift-ribbon ribbon-h"></div>
            </div>
        </div>
        <p class="tap-text">Tap to Open Magic</p>
    </div>

    <div class="main-content" id="mainContent">
        <h1>Happy Birthday!</h1>
        <p class="message" id="typedMessage"></p>
        <div class="signature" id="signature">Forever Your Friend ✨</div>
        
        <div class="featured-photo-container">
            <div class="photo-frame">
                <img src="img2.png" alt="Special Memory">
            </div>
        </div>

        <button class="btn-celebrate" onclick="party()">MORE MAGIC!</button>
    </div>

    <div class="music-control" id="musicToggle" onclick="toggleMusic()" style="display: none;">
        🔊
    </div>

    <!-- Note: Google Drive links are often unreliable for direct streaming. 
         If the sound still doesn't play, please ensure you have a 'song.mp3' file in this folder and update the src below to "song.mp3" -->
    <audio id="birthdaySong" loop pre-load="auto">
        <source src="_Oh_My_Kadavule_Friendship_Anthem_Tamil_Ringtone_(by Fringster.com).mp3" type="audio/mpeg">
        <source src="song.mp3" type="audio/mpeg">
        <source src="https://github.com/Kira-7/Happy-Birthday/raw/master/music.mp3" type="audio/mpeg">
    </audio>

    <script>
        let isPlaying = false;

        function toggleMusic() {
            const song = document.getElementById('birthdaySong');
            const btn = document.getElementById('musicToggle');
            if (isPlaying) {
                song.pause();
                btn.innerHTML = '🔇';
            } else {
                song.play();
                btn.innerHTML = '🔊';
            }
            isPlaying = !isPlaying;
        }

        function reveal() {
            const welcome = document.getElementById('welcomeScreen');
            const main = document.getElementById('mainContent');
            const bgImage = document.getElementById('bgImage');
            const song = document.getElementById('birthdaySong');
            const musicBtn = document.getElementById('musicToggle');

            // Play the song
            song.play().then(() => {
                isPlaying = true;
                musicBtn.style.display = 'block';
            }).catch(e => {
                console.log("Playback failed:", e);
                // If it fails, show the button so the user can try manually
                musicBtn.style.display = 'block';
                musicBtn.innerHTML = '🔇';
            });

            welcome.style.opacity = '0';
            welcome.style.transform = 'scale(2) perspective(1000px) rotateX(20deg)';
            
            setTimeout(() => {
                welcome.style.display = 'none';
                main.classList.add('active');
                bgImage.style.opacity = '0.7';
                bgImage.style.filter = 'blur(0px)';
                startTyping();
                party();
                createBalloons();
            }, 500);
        }

        function startTyping() {
            const text = "தோழி... உன்னோடு கழித்த அந்த நினைவுகள் என்றும் என் மனதிற்கு நெருக்கமானவை. இனிய பிறந்தநாள் வாழ்த்துக்கள் என் அன்புத் தோழி!";
            const container = document.getElementById('typedMessage');
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    if (text.charAt(i) === '\n') {
                        container.innerHTML += '<br>';
                    } else {
                        container.innerHTML += text.charAt(i);
                    }
                    i++;
                    setTimeout(type, 50);
                } else {
                    document.getElementById('signature').classList.add('show');
                }
            }
            type();
        }

        function party() {
            var count = 200;
            var defaults = {
                origin: { y: 0.7 },
                zIndex: 1000
            };

            function fire(particleRatio, opts) {
                confetti({
                    ...defaults,
                    ...opts,
                    particleCount: Math.floor(count * particleRatio)
                });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function createBalloons() {
            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
                balloon.style.animationDuration = (Math.random() * 3 + 4) + 's';
                balloon.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
                document.body.appendChild(balloon);
                
                setTimeout(() => balloon.remove(), 7000);
            }, 500);
        }

        // Particle effect logic (simplified)
        const canvas = document.createElement('canvas');
        document.getElementById('particles-js').appendChild(canvas);
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 105, 180, 0.4)';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        initParticles();
        animate();
    </script>
</body>
</html>
